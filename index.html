<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apresentação do Produto</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#838080;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .card{
      background:#fff;
      width:500px;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:300px;
      object-fit:cover;
    }

    .content{
      padding:20px;
    }

    .title{
      font-size:24px;
      margin-bottom:10px;
      color:#222;
    }

    h2{
      font-size:30px;
      text-align: center;
      color:#222;
    }

    .description{
      color:#666;
      line-height:1.5;
      margin-bottom:20px;
    }

    .btn{
      display:block;
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#111;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }
   
    .btn:hover{
      background:#7e7e7e;
    }
  </style>

</head>
<body>
<!--<h2>O MAIS NOVO LANÇAMENTO DA APPLE</h2>-->
  <div class="card">
    
    <img src="iphones.png" alt="Produto">

    <div class="content">
      <h1 class="title">Iphone 17</h1>

      <p class="description">
       Seu novo iPhone. Mais 
       pessoal do que nunca.
      </p>

      <a href="detalhes.html" class="btn">       
      <button class="btn">SAIBA MAIS</button>
      </a>

    </div>
  </div>

</body>
</html>
